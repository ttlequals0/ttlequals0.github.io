---
layout: default
make-smaller-titles: true
---


<div class="container-fluid index">
    <div class="row">

        <div class="col-md-12 main content-panel">

            <div class="gravatar">
                <img src="{{ site.title_image }}" class="img-square about-image" height="150" width="150" alt="{{ site.title }}" />
            </div>

            <h1 class="header author-header" itemprop="headline">{{ site.title }}</h1>

            <div class="author-text">
                {{ site.title_description }}
            </div>

            {% include social_links.html %}
          </div>

        </div>

        <div class="col-md-12 projects-showcase">
            <div class="projects-row">
                <a href="https://github.com/ttlequals0/MinusPod" class="project-card" target="_blank">
                    <div class="project-icon">
                        <img src="{{ site.baseurl }}/assets/minuspod-logo.svg" alt="MinusPod" />
                    </div>
                    <span class="project-name">MinusPod</span>
                </a>
                <a href="https://github.com/ttlequals0/PixelProbe" class="project-card" target="_blank">
                    <div class="project-icon">
                        <img src="{{ site.baseurl }}/assets/pixelprobe-logo.png" alt="PixelProbe" />
                    </div>
                    <span class="project-name">PixelProbe</span>
                </a>
            </div>
        </div>

    </div>
</div>
